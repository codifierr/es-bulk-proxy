# Elasticsearch Proxy Configuration
# This is an example configuration file. All values can be overridden by environment variables.

server:
  port: "8080"

  # HTTP server timeouts
  # Timeout for reading the entire request, including body
  # For large bulk requests, increase this value (e.g., "5m")
  readtimeout: "30s"

  # Timeout for writing the response
  writetimeout: "30s"

  # Maximum time to wait for the next request when keep-alives are enabled
  idletimeout: "2m"

elasticsearch:
  url: "http://es:9200"

buffer:
  # Time interval to flush buffer
  flushinterval: "60s"

  # Maximum batch size in bytes (5MB)
  maxbatchsize: 5242880

  # Maximum total buffer size in bytes (50MB)
  maxbuffersize: 52428800

retry:
  # Number of retry attempts for failed bulk sends
  attempts: 3

  # Minimum backoff duration for retries
  backoffmin: "100ms"

logger:
  syslog:
    # Enable syslog forwarding
    enabled: false

    # Syslog network protocol (udp, tcp)
    network: "udp"

    # Syslog server address (host:port)
    address: "localhost:514"
